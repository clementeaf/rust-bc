name: Lint

on:
  push:
    branches: [develop, feature/*, hotfix/*, release/*]
  pull_request:
    branches: [main, develop]

jobs:
  lint-rust:
    name: Lint Rust (clippy + format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check 2>&1 | head -20
        continue-on-error: true

      - name: Run clippy
        run: cargo clippy --all -- -D warnings 2>&1 | head -50
        continue-on-error: true

      - name: Check for common issues
        run: |
          echo "Checking for TODO/FIXME comments:"
          grep -r "TODO\|FIXME" src/ || echo "No TODOs found"
        continue-on-error: true

  lint-summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [lint-rust]
    if: always()
    steps:
      - name: Check lint results
        run: |
          echo "Rust Lint: ${{ needs.lint-rust.result }}"
          if [ "${{ needs.lint-rust.result }}" = "failure" ]; then
            echo "Linting issues found. Review logs above."
            exit 1
          fi
          echo "Code style checks passed"
