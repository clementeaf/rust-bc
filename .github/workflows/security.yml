name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'  # Weekly Monday 2 AM UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  secrets-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  unsafe-review:
    name: Unsafe Code Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count unsafe blocks
        run: |
          count=$(grep -r "unsafe" src/ --include="*.rs" | grep -v "// SAFETY:" | grep -v "#\[allow(unsafe" | wc -l)
          echo "Unsafe blocks without SAFETY comment: $count"
          if [ "$count" -gt 0 ]; then
            echo "::warning::Found $count unsafe blocks without // SAFETY: comment"
            grep -rn "unsafe" src/ --include="*.rs" | grep -v "// SAFETY:" | grep -v "#\[allow(unsafe" | head -20
          fi

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [secrets-scan, cargo-audit, unsafe-review]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Secrets Scan: ${{ needs.secrets-scan.result }}"
          echo "Cargo Audit: ${{ needs.cargo-audit.result }}"
          echo "Unsafe Review: ${{ needs.unsafe-review.result }}"
          if [ "${{ needs.secrets-scan.result }}" = "failure" ]; then
            echo "::error::SECRETS FOUND"
            exit 1
          fi
          echo "Security scans complete"
