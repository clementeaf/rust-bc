name: Pre-Lab Audit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/pqc_crypto_module/**"
      - "pre_lab_audit/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: FIPS Pre-Lab Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Crypto module tests
        run: cargo test -p pqc_crypto_module -- --test-threads=1

      - name: Crypto boundary enforcement
        run: cargo test --test crypto_boundary

      - name: FIPS readiness tests
        run: cargo test -p pqc_crypto_module --test fips_readiness -- --test-threads=1

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Dependency audit
        run: cargo audit

      - name: Clean-room build verification
        run: bash scripts/clean_room_build.sh

      - name: Upload pre-lab audit package
        uses: actions/upload-artifact@v4
        with:
          name: pre-lab-audit-package
          path: pre_lab_audit/
