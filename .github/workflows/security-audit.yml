name: Security Audit

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 6am

env:
  CARGO_TERM_COLOR: always
  REQUIRE_PQC_SIGNATURES: "true"
  DUAL_SIGN_VERIFY_MODE: "both"
  HASH_ALGORITHM: "sha3-256"

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit

  security-tests:
    name: PQC Security + Byzantine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test pqc_security_audit
      - run: cargo test --test byzantine_equivocation
      - run: cargo test --test equivocation_persistence_partition
      - run: cargo test --test slashing_penalty_lifecycle
      - run: cargo test --test crypto_dos_flood
