name: Build

on:
  push:
    branches: [main, develop, feature/*, hotfix/*, release/*]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  build-backend:
    name: Build Backend (Rust)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Verify Cargo.toml exists
        run: test -f Cargo.toml || echo "No backend Cargo.toml found"

      - name: Build backend (release)
        run: cargo build --release --all
        continue-on-error: true

      - name: Check backend (debug)
        run: cargo check --all
        continue-on-error: true

  compile-check:
    name: Compilation Check (Quick Validation)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cargo check
        run: cargo check --all 2>&1 | head -20
        continue-on-error: true

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-backend, compile-check]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "Build Backend (Rust): ${{ needs.build-backend.result }}"
          echo "Compile Check: ${{ needs.compile-check.result }}"
          if [ "${{ needs.build-backend.result }}" = "failure" ]; then
            echo "Some builds had issues. Review logs above."
            exit 0
          fi
          echo "Build pipeline ready for testing"
