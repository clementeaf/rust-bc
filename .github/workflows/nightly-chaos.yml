name: Nightly Chaos

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REQUIRE_PQC_SIGNATURES: "true"
  TLS_PQC_KEM: "true"
  DUAL_SIGN_VERIFY_MODE: "both"
  HASH_ALGORITHM: "sha3-256"
  SIGNING_ALGORITHM: "ml-dsa-65"

jobs:
  chaos:
    name: Chaos Network + Persistence + DoS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2

      - name: Chaos network tests
        run: cargo test --test chaos_network -- --nocapture

      - name: Persistent crash recovery
        run: cargo test --test persistent_crash_recovery -- --nocapture

      - name: Crypto DoS flood
        run: cargo test --test crypto_dos_flood -- --nocapture

      - name: Byzantine equivocation
        run: cargo test --test byzantine_equivocation -- --nocapture

      - name: Equivocation persistence + partition
        run: cargo test --test equivocation_persistence_partition -- --nocapture

      - name: Performance benchmarks
        run: cargo bench --bench pqc_performance 2>&1 | tee bench-output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-output.txt
