name: Test

on:
  push:
    branches: [develop, feature/*, hotfix/*, release/*]
  pull_request:
    branches: [main, develop]

env:
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  test-backend:
    name: Test Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --lib --all 2>&1 | tail -50
        continue-on-error: true

      - name: Run integration tests
        run: cargo test --test '*' --all 2>&1 | tail -50
        continue-on-error: true

      - name: Generate coverage report
        run: |
          cargo install tarpaulin --locked 2>/dev/null || true
          cargo tarpaulin --out Html --output-dir coverage 2>/dev/null || echo "Coverage report skipped"
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage
          path: coverage/
        continue-on-error: true

  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "Backend Tests: ${{ needs.test-backend.result }}"
          if [ "${{ needs.test-backend.result }}" = "failure" ]; then
            echo "Some tests failed. Review logs above."
            exit 1
          fi
          echo "All tests passed"
