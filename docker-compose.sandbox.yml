# Cerulean Ledger — Sandbox Compose (Enterprise Edition)
#
# Single-node demo with frontends, observability, and resource governance.
# Designed for Cloudflare Tunnel exposure or local evaluation.
#
# Usage:
#   docker compose -f docker-compose.sandbox.yml build
#   docker compose -f docker-compose.sandbox.yml up -d
#
# Services exposed:
#   :9600  — Cerulean node API (PQC, permissive ACL, RocksDB)
#   :5173  — Block Explorer (Cerulean Ledger UI)
#   :5174  — Cerulean Voto (electronic voting UI)
#   :9090  — Prometheus (metrics)
#   :3000  — Grafana (dashboards, admin/admin)

services:
  node:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: "${BUILD_VERSION:-dev}"
    container_name: cerulean-sandbox-node
    restart: unless-stopped
    ports:
      - "9600:8080"
    environment:
      BIND_ADDR: "0.0.0.0"
      API_PORT: "8080"
      P2P_PORT: "8081"
      RUST_LOG: "info"
      NETWORK_ID: "cerulean-sandbox"
      ORG_ID: "sandbox"
      NODE_ROLE: "peer_and_orderer"
      STORAGE_BACKEND: "rocksdb"
      STORAGE_PATH: "/app/data/rocksdb"
      ACL_MODE: "permissive"
      SIGNING_ALGORITHM: "ml-dsa-65"
      ORACLE_DEMO: "true"
      ORACLE_DEMO_INTERVAL_SECS: "15"
      BUILD_VERSION: "${BUILD_VERSION:-dev}"
    volumes:
      - sandbox-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    networks:
      - cerulean-sandbox

  explorer:
    build:
      context: ./block-explorer-vite
      dockerfile: Dockerfile
    container_name: cerulean-sandbox-explorer
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      node:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - cerulean-sandbox

  voto:
    build:
      context: ./cerulean-voto
      dockerfile: Dockerfile
    container_name: cerulean-sandbox-voto
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      node:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - cerulean-sandbox

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: cerulean-sandbox-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/sandbox/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      node:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - cerulean-sandbox

  grafana:
    image: grafana/grafana:11.1.0
    container_name: cerulean-sandbox-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/provisioning/dashboards/sandbox.json"
    volumes:
      - ./deploy/sandbox/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./deploy/sandbox/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/sandbox/dashboard-sandbox.json:/etc/grafana/provisioning/dashboards/sandbox.json:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - cerulean-sandbox

volumes:
  sandbox-data:

networks:
  cerulean-sandbox:
    driver: bridge
