version: '3.8'

x-node-defaults: &node-defaults
  image: ghcr.io/clementeaf/rust-bc:latest
  build: .  # Fallback: local build if image not available
  restart: unless-stopped
  networks:
    - bc-net
  volumes:
    - ./deploy/tls:/tls:ro
  healthcheck:
    test: ["CMD", "curl", "-fk", "https://localhost:8080/api/v1/health"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 10s

services:
  # ── Peer nodes (org1) ──────────────────────────────────────────────────────

  node1:
    <<: *node-defaults
    container_name: rust-bc-node1
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      BIND_ADDR: "0.0.0.0"
      P2P_EXTERNAL_ADDRESS: "node1:8081"
      API_PORT: "8080"
      P2P_PORT: "8081"
      DIFFICULTY: "1"
      RUST_LOG: "info"
      NETWORK_ID: "local-test"
      ORG_ID: "org1"
      NODE_ROLE: "peer_and_orderer"
      STORAGE_BACKEND: "rocksdb"
      STORAGE_PATH: "/app/data/rocksdb"
      # TLS
      TLS_CERT_PATH: "/tls/node1-cert.pem"
      TLS_KEY_PATH: "/tls/node1-key.pem"
      TLS_CA_CERT_PATH: "/tls/ca-cert.pem"
      # Rate limiting
      RATE_LIMIT_RPS: "100"
      RATE_LIMIT_BURST: "200"
      # Bootstrap
      BOOTSTRAP_NODES: "node2:8081,node3:8081"
      ANCHOR_PEERS: "org1:node1:8081,org2:node2:8081"
      ACL_MODE: "${ACL_MODE:-permissive}"
      RATE_LIMIT_PER_SECOND: "${RATE_LIMIT_PER_SECOND:-20}"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-600}"
      RATE_LIMIT_PER_HOUR: "${RATE_LIMIT_PER_HOUR:-10000}"
    volumes:
      - node1-data:/app/data
      - ./deploy/tls:/tls:ro

  node2:
    <<: *node-defaults
    container_name: rust-bc-node2
    ports:
      - "8082:8080"
      - "8083:8081"
    environment:
      BIND_ADDR: "0.0.0.0"
      P2P_EXTERNAL_ADDRESS: "node2:8081"
      API_PORT: "8080"
      P2P_PORT: "8081"
      DIFFICULTY: "1"
      RUST_LOG: "info"
      NETWORK_ID: "local-test"
      ORG_ID: "org2"
      NODE_ROLE: "peer"
      STORAGE_BACKEND: "rocksdb"
      STORAGE_PATH: "/app/data/rocksdb"
      TLS_CERT_PATH: "/tls/node2-cert.pem"
      TLS_KEY_PATH: "/tls/node2-key.pem"
      TLS_CA_CERT_PATH: "/tls/ca-cert.pem"
      RATE_LIMIT_RPS: "100"
      RATE_LIMIT_BURST: "200"
      BOOTSTRAP_NODES: "node1:8081,node3:8081"
      ANCHOR_PEERS: "org1:node1:8081,org2:node2:8081"
      ACL_MODE: "${ACL_MODE:-permissive}"
    volumes:
      - node2-data:/app/data
      - ./deploy/tls:/tls:ro
    depends_on:
      - node1

  node3:
    <<: *node-defaults
    container_name: rust-bc-node3
    ports:
      - "8084:8080"
      - "8085:8081"
    environment:
      BIND_ADDR: "0.0.0.0"
      P2P_EXTERNAL_ADDRESS: "node3:8081"
      API_PORT: "8080"
      P2P_PORT: "8081"
      DIFFICULTY: "1"
      RUST_LOG: "info"
      NETWORK_ID: "local-test"
      ORG_ID: "org1"
      NODE_ROLE: "peer"
      STORAGE_BACKEND: "rocksdb"
      STORAGE_PATH: "/app/data/rocksdb"
      TLS_CERT_PATH: "/tls/node3-cert.pem"
      TLS_KEY_PATH: "/tls/node3-key.pem"
      TLS_CA_CERT_PATH: "/tls/ca-cert.pem"
      RATE_LIMIT_RPS: "100"
      RATE_LIMIT_BURST: "200"
      BOOTSTRAP_NODES: "node1:8081,node2:8081"
      ANCHOR_PEERS: "org1:node1:8081,org2:node2:8081"
      ACL_MODE: "${ACL_MODE:-permissive}"
    volumes:
      - node3-data:/app/data
      - ./deploy/tls:/tls:ro
    depends_on:
      - node1

  # ── Orderers (3-node Raft cluster) ────────────────────────────────────────

  orderer1:
    <<: *node-defaults
    container_name: rust-bc-orderer1
    ports:
      - "8086:8080"
      - "8087:8081"
    environment:
      BIND_ADDR: "0.0.0.0"
      P2P_EXTERNAL_ADDRESS: "orderer1:8081"
      API_PORT: "8080"
      P2P_PORT: "8081"
      DIFFICULTY: "1"
      RUST_LOG: "info"
      NETWORK_ID: "local-test"
      ORG_ID: "ordererOrg"
      NODE_ROLE: "orderer"
      ORDERING_BACKEND: "raft"
      RAFT_NODE_ID: "1"
      RAFT_PEERS: "1:orderer1:8081,2:orderer2:8081,3:orderer3:8081"
      STORAGE_BACKEND: "rocksdb"
      STORAGE_PATH: "/app/data/rocksdb"
      TLS_CERT_PATH: "/tls/orderer1-cert.pem"
      TLS_KEY_PATH: "/tls/orderer1-key.pem"
      TLS_CA_CERT_PATH: "/tls/ca-cert.pem"
      RATE_LIMIT_RPS: "200"
      RATE_LIMIT_BURST: "400"
      BOOTSTRAP_NODES: "node1:8081,orderer2:8081,orderer3:8081"
      ACL_MODE: "${ACL_MODE:-permissive}"
    volumes:
      - orderer1-data:/app/data
      - ./deploy/tls:/tls:ro

  orderer2:
    <<: *node-defaults
    container_name: rust-bc-orderer2
    ports:
      - "8088:8080"
      - "8089:8081"
    environment:
      BIND_ADDR: "0.0.0.0"
      P2P_EXTERNAL_ADDRESS: "orderer2:8081"
      API_PORT: "8080"
      P2P_PORT: "8081"
      DIFFICULTY: "1"
      RUST_LOG: "info"
      NETWORK_ID: "local-test"
      ORG_ID: "ordererOrg"
      NODE_ROLE: "orderer"
      ORDERING_BACKEND: "raft"
      RAFT_NODE_ID: "2"
      RAFT_PEERS: "1:orderer1:8081,2:orderer2:8081,3:orderer3:8081"
      STORAGE_BACKEND: "rocksdb"
      STORAGE_PATH: "/app/data/rocksdb"
      TLS_CERT_PATH: "/tls/orderer2-cert.pem"
      TLS_KEY_PATH: "/tls/orderer2-key.pem"
      TLS_CA_CERT_PATH: "/tls/ca-cert.pem"
      RATE_LIMIT_RPS: "200"
      RATE_LIMIT_BURST: "400"
      BOOTSTRAP_NODES: "orderer1:8081,orderer3:8081"
      ACL_MODE: "${ACL_MODE:-permissive}"
    volumes:
      - orderer2-data:/app/data
      - ./deploy/tls:/tls:ro
    depends_on:
      - orderer1

  orderer3:
    <<: *node-defaults
    container_name: rust-bc-orderer3
    ports:
      - "8090:8080"
      - "8091:8081"
    environment:
      BIND_ADDR: "0.0.0.0"
      P2P_EXTERNAL_ADDRESS: "orderer3:8081"
      API_PORT: "8080"
      P2P_PORT: "8081"
      DIFFICULTY: "1"
      RUST_LOG: "info"
      NETWORK_ID: "local-test"
      ORG_ID: "ordererOrg"
      NODE_ROLE: "orderer"
      ORDERING_BACKEND: "raft"
      RAFT_NODE_ID: "3"
      RAFT_PEERS: "1:orderer1:8081,2:orderer2:8081,3:orderer3:8081"
      STORAGE_BACKEND: "rocksdb"
      STORAGE_PATH: "/app/data/rocksdb"
      TLS_CERT_PATH: "/tls/orderer3-cert.pem"
      TLS_KEY_PATH: "/tls/orderer3-key.pem"
      TLS_CA_CERT_PATH: "/tls/ca-cert.pem"
      RATE_LIMIT_RPS: "200"
      RATE_LIMIT_BURST: "400"
      BOOTSTRAP_NODES: "orderer1:8081,orderer2:8081"
      ACL_MODE: "${ACL_MODE:-permissive}"
    volumes:
      - orderer3-data:/app/data
      - ./deploy/tls:/tls:ro
    depends_on:
      - orderer1

  # ── Monitoring ─────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rust-bc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - bc-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.1
    container_name: rust-bc-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - bc-net
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  node1-data:
  node2-data:
  node3-data:
  orderer1-data:
  orderer2-data:
  orderer3-data:
  prometheus-data:
  grafana-data:

networks:
  bc-net:
    driver: bridge
