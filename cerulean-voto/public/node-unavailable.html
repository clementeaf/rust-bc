<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerulean Ledger — Nodo no disponible</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafbfc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1a1a2e;
        }
        .container {
            text-align: center;
            max-width: 480px;
            padding: 2rem;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .retry-btn {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            background: #2563eb;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: #1d4ed8; }
        .status { margin-top: 2rem; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏳</div>
        <h1>Nodo temporalmente no disponible</h1>
        <p>
            El nodo Cerulean está reiniciándose o no ha terminado de arrancar.
            Esto suele resolverse en unos segundos.
        </p>
        <a href="/" class="retry-btn">Reintentar</a>
        <div class="status">
            Si el problema persiste, verifica el estado del contenedor:<br>
            <code>docker logs cerulean-sandbox-node</code>
        </div>
    </div>
    <script>
        // Auto-retry every 5 seconds
        setTimeout(() => { window.location.reload(); }, 5000);
    </script>
</body>
</html>
