# Cerulean Ledger — Deploy Compose (Demo/Review)
#
# Secured single-node deployment with TLS termination via Caddy.
# All services are internal except Caddy (80/443).
#
# Required env vars (set in .env or export before running):
#   DEPLOY_DOMAIN        — e.g. cerulean.example.com
#   JWT_SECRET           — random 32+ char string
#   HMAC_SECRET          — random 32+ char string
#   GRAFANA_PASSWORD     — Grafana admin password
#
# Usage:
#   cp .env.deploy.example .env
#   # Edit .env with real values
#   docker compose -f docker-compose.deploy.yml build
#   docker compose -f docker-compose.deploy.yml up -d
#
# Endpoints (all behind TLS):
#   https://${DEPLOY_DOMAIN}           — Block Explorer
#   https://${DEPLOY_DOMAIN}/voto      — Cerulean Voto
#   https://${DEPLOY_DOMAIN}/api/      — Node API
#   https://${DEPLOY_DOMAIN}/grafana   — Grafana
#   https://${DEPLOY_DOMAIN}/prometheus — Prometheus (basic auth via Caddy)

services:
  caddy:
    image: caddy:2-alpine
    container_name: cerulean-deploy-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DEPLOY_DOMAIN: "${DEPLOY_DOMAIN:?Set DEPLOY_DOMAIN in .env}"
    depends_on:
      node:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - cerulean-deploy

  node:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: "${BUILD_VERSION:-dev}"
    container_name: cerulean-deploy-node
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      BIND_ADDR: "0.0.0.0"
      API_PORT: "8080"
      P2P_PORT: "8081"
      RUST_LOG: "info"
      NETWORK_ID: "cerulean-demo"
      ORG_ID: "cerulean"
      NODE_ROLE: "peer_and_orderer"
      STORAGE_BACKEND: "rocksdb"
      STORAGE_PATH: "/app/data/rocksdb"
      ACL_MODE: "strict"
      SIGNING_ALGORITHM: "ml-dsa-65"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      CHECKPOINT_HMAC_SECRET: "${HMAC_SECRET:?Set HMAC_SECRET in .env}"
      ORACLE_DEMO: "true"
      ORACLE_DEMO_INTERVAL_SECS: "15"
      BUILD_VERSION: "${BUILD_VERSION:-dev}"
    volumes:
      - deploy-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    networks:
      - cerulean-deploy

  explorer:
    build:
      context: ./block-explorer-vite
      dockerfile: Dockerfile
    container_name: cerulean-deploy-explorer
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      node:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - cerulean-deploy

  voto:
    build:
      context: ./cerulean-voto
      dockerfile: Dockerfile
    container_name: cerulean-deploy-voto
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      node:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - cerulean-deploy

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: cerulean-deploy-prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./deploy/sandbox/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      node:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    networks:
      - cerulean-deploy

  grafana:
    image: grafana/grafana:11.1.0
    container_name: cerulean-deploy-grafana
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://${DEPLOY_DOMAIN}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/etc/grafana/provisioning/dashboards/sandbox.json"
    volumes:
      - ./deploy/sandbox/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./deploy/sandbox/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/sandbox/dashboard-sandbox.json:/etc/grafana/provisioning/dashboards/sandbox.json:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - cerulean-deploy

volumes:
  deploy-data:
  caddy-data:
  caddy-config:

networks:
  cerulean-deploy:
    driver: bridge
