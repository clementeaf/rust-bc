events {
    worker_connections 1024;
}

http {
    # Rate limiting: 100 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=faucet:10m rate=10r/m;

    upstream cerulean_api {
        server api:8080;
    }

    server {
        listen 80;
        server_name _;

        # Health check (no rate limit)
        location = /api/v1/health {
            proxy_pass http://cerulean_api;
        }

        # Faucet (stricter rate limit)
        location /api/v1/faucet/ {
            limit_req zone=faucet burst=5 nodelay;
            proxy_pass http://cerulean_api;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://cerulean_api;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Max request body 1MB
            client_max_body_size 1m;
        }

        # Block direct access to metrics
        location /metrics {
            deny all;
        }
    }
}
