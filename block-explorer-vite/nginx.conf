server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all non-file routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Cerulean node
    location /api/ {
        proxy_pass http://node:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;

        # Custom error pages when node is unavailable
        proxy_intercept_errors on;
        error_page 502 503 504 /node-unavailable.html;
    }

    # SSE/EventSource — long-lived connections for event stream
    location /api/v1/events {
        proxy_pass http://node:8080/api/v1/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # Branded error page
    location = /node-unavailable.html {
        internal;
    }
}
